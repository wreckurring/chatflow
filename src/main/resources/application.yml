spring:
  application:
    name: chatflow

  datasource:
    url: jdbc:postgresql://localhost:5432/chatflow
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-init-sql: SET TIME ZONE 'Asia/Kolkata'

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 60000ms

  server:
    port: 8080

  jwt:
    secret: mohitkumar-chatflow-secret-key-change-this-in-prod
    expiration: 86400000

  resilience4j.circuitbreaker:
    instances:
      databaseCircuitBreaker:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10000ms
        permittedNumberOfCallsInHalfOpenState: 3

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always