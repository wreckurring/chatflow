<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatFlow - Real-time Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 1200px;
            height: 90vh;
            max-height: 800px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Auth Screen */
        .auth-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            height: 100%;
        }

        .auth-screen h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-screen p {
            color: #666;
            margin-bottom: 40px;
        }

        .auth-form {
            width: 100%;
            max-width: 400px;
        }

        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .auth-tab {
            flex: 1;
            padding: 12px;
            border: none;
            background: #f0f0f0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .auth-tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .error-message {
            background: #fee;
            color: #c00;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        /* Chat Screen */
        .chat-screen {
            display: none;
            height: 100%;
            flex-direction: column;
        }

        .chat-screen.active {
            display: flex;
        }

        /* Header */
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h2 {
            font-size: 1.5rem;
        }

        .online-badge {
            background: rgba(255,255,255,0.2);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .online-dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .btn-logout {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
        }

        .btn-logout:hover {
            background: rgba(255,255,255,0.3);
        }

        /* Main Chat Area */
        .chat-main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar */
        .chat-sidebar {
            width: 280px;
            background: #f8f9fa;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
        }

        .sidebar-header h3 {
            margin-bottom: 10px;
            color: #333;
        }

        .create-room-btn {
            width: 100%;
            padding: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
        }

        .create-room-btn:hover {
            background: #5568d3;
        }

        .rooms-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .room-item {
            padding: 12px;
            margin-bottom: 8px;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .room-item:hover {
            background: #f0f0f0;
        }

        .room-item.active {
            background: #667eea;
            color: white;
            border-color: #5568d3;
        }

        .room-name {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .room-desc {
            font-size: 12px;
            opacity: 0.8;
        }

        /* Messages Area */
        .messages-container {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .messages-header {
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
            background: white;
        }

        .messages-header h3 {
            color: #333;
        }

        .messages-list {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
        }

        .message.own {
            align-items: flex-end;
        }

        .message.system {
            align-items: center;
        }

        .message-sender {
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
            font-weight: 600;
        }

        .message-content {
            background: white;
            padding: 12px 16px;
            border-radius: 12px;
            max-width: 70%;
            word-wrap: break-word;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .message.own .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .message.system .message-content {
            background: #e0e0e0;
            color: #666;
            font-size: 13px;
            font-style: italic;
        }

        .message-time {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
        }

        /* Message Input */
        .message-input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        .message-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 24px;
            font-size: 16px;
            outline: none;
        }

        .message-input:focus {
            border-color: #667eea;
        }

        .send-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-weight: 600;
        }

        .send-btn:hover {
            transform: scale(1.05);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 16px;
            width: 90%;
            max-width: 400px;
        }

        .modal-content h3 {
            margin-bottom: 20px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #999;
        }

        .empty-state h3 {
            margin-top: 20px;
            font-size: 1.5rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .chat-sidebar {
                width: 100%;
                position: absolute;
                height: 100%;
                z-index: 10;
                transform: translateX(-100%);
                transition: transform 0.3s;
            }

            .chat-sidebar.show {
                transform: translateX(0);
            }

            .message-content {
                max-width: 85%;
            }
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 20px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Auth Screen -->
        <div class="auth-screen" id="authScreen">
            <h1>💬 ChatFlow</h1>
            <p>Real-time chat built with Spring Boot & WebSockets</p>
            
            <div class="auth-form">
                <div class="error-message" id="authError"></div>
                
                <div class="auth-tabs">
                    <button class="auth-tab active" onclick="switchTab('login')">Login</button>
                    <button class="auth-tab" onclick="switchTab('register')">Register</button>
                </div>

                <!-- Login Form -->
                <form id="loginForm">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="loginUsername" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Login</button>
                </form>

                <!-- Register Form -->
                <form id="registerForm" style="display: none;">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="regUsername" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="regEmail" required>
                    </div>
                    <div class="form-group">
                        <label>Display Name</label>
                        <input type="text" id="regDisplayName" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="regPassword" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Register</button>
                </form>
            </div>
        </div>

        <!-- Chat Screen -->
        <div class="chat-screen" id="chatScreen">
            <!-- Header -->
            <div class="chat-header">
                <div>
                    <h2 id="currentUsername">ChatFlow</h2>
                    <div class="online-badge">
                        <span class="online-dot"></span>
                        <span id="onlineCount">0 online</span>
                    </div>
                </div>
                <button class="btn-logout" onclick="logout()">Logout</button>
            </div>

            <!-- Main Chat Area -->
            <div class="chat-main">
                <!-- Sidebar -->
                <div class="chat-sidebar">
                    <div class="sidebar-header">
                        <h3>Rooms</h3>
                        <button class="create-room-btn" onclick="showCreateRoomModal()">+ Create Room</button>
                    </div>
                    <div class="rooms-list" id="roomsList">
                        <div class="loading">Loading rooms...</div>
                    </div>
                </div>

                <!-- Messages -->
                <div class="messages-container">
                    <div class="messages-header">
                        <h3 id="currentRoomName">Select a room to start chatting</h3>
                    </div>
                    <div class="messages-list" id="messagesList">
                        <div class="empty-state">
                            <h3>👈 Select a room</h3>
                            <p>Choose a room from the sidebar to start chatting</p>
                        </div>
                    </div>
                    <div class="message-input-container" id="messageInputContainer" style="display: none;">
                        <input 
                            type="text" 
                            class="message-input" 
                            id="messageInput" 
                            placeholder="Type a message..."
                            onkeypress="handleKeyPress(event)"
                        >
                        <button class="send-btn" onclick="sendMessage()">Send</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Create Room Modal -->
    <div class="modal" id="createRoomModal">
        <div class="modal-content">
            <h3>Create New Room</h3>
            <div class="form-group">
                <label>Room Name</label>
                <input type="text" id="newRoomName" placeholder="e.g., General">
            </div>
            <div class="form-group">
                <label>Description</label>
                <input type="text" id="newRoomDesc" placeholder="What's this room about?">
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="hideCreateRoomModal()">Cancel</button>
                <button class="btn btn-primary" onclick="createRoom()">Create</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8080/api';
        const WS_URL = 'http://localhost:8080/ws';
        
        let authToken = null;
        let currentUser = null;
        let stompClient = null;
        let currentRoom = null;
        let subscription = null;

        // Auth functions
        function switchTab(tab) {
            const tabs = document.querySelectorAll('.auth-tab');
            tabs.forEach(t => t.classList.remove('active'));
            
            if (tab === 'login') {
                tabs[0].classList.add('active');
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('registerForm').style.display = 'none';
            } else {
                tabs[1].classList.add('active');
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('registerForm').style.display = 'block';
            }
            hideError();
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            
            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                if (!response.ok) throw new Error('Login failed');
                
                const data = await response.json();
                authToken = data.token;
                currentUser = data;
                
                showChatScreen();
            } catch (error) {
                showError('Login failed. Please check your credentials.');
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const displayName = document.getElementById('regDisplayName').value;
            const password = document.getElementById('regPassword').value;
            
            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, displayName, password })
                });
                
                if (!response.ok) throw new Error('Registration failed');
                
                const data = await response.json();
                authToken = data.token;
                currentUser = data;
                
                showChatScreen();
            } catch (error) {
                showError('Registration failed. Username or email might be taken.');
            }
        });

        function showError(message) {
            const errorEl = document.getElementById('authError');
            errorEl.textContent = message;
            errorEl.classList.add('show');
        }

        function hideError() {
            document.getElementById('authError').classList.remove('show');
        }

        function showChatScreen() {
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('chatScreen').classList.add('active');
            document.getElementById('currentUsername').textContent = currentUser.displayName || currentUser.username;
            
            connectWebSocket();
            loadRooms();
            loadOnlineCount();
        }

        function logout() {
            if (stompClient) {
                stompClient.disconnect();
            }
            authToken = null;
            currentUser = null;
            currentRoom = null;
            
            document.getElementById('authScreen').style.display = 'flex';
            document.getElementById('chatScreen').classList.remove('active');
            
            // Reset forms
            document.getElementById('loginForm').reset();
            document.getElementById('registerForm').reset();
        }

        // WebSocket functions
        function connectWebSocket() {
            const socket = new SockJS(WS_URL);
            stompClient = Stomp.over(socket);
            
            stompClient.connect(
                { Authorization: `Bearer ${authToken}` },
                () => {
                    console.log('WebSocket connected');
                },
                (error) => {
                    console.error('WebSocket error:', error);
                }
            );
        }

        // Room functions
        async function loadRooms() {
            try {
                const response = await fetch(`${API_URL}/rooms`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                
                const rooms = await response.json();
                displayRooms(rooms);
            } catch (error) {
                console.error('Failed to load rooms:', error);
            }
        }

        function displayRooms(rooms) {
            const list = document.getElementById('roomsList');
            
            if (rooms.length === 0) {
                list.innerHTML = '<div class="loading">No rooms yet. Create one!</div>';
                return;
            }
            
            list.innerHTML = rooms.map(room => `
                <div class="room-item" onclick="joinRoom(${room.id}, '${room.name}')">
                    <div class="room-name">${room.name}</div>
                    <div class="room-desc">${room.description || 'No description'}</div>
                </div>
            `).join('');
        }

        async function joinRoom(roomId, roomName) {
            if (currentRoom === roomId) return;
            
            // Unsubscribe from previous room
            if (subscription) {
                subscription.unsubscribe();
            }
            
            currentRoom = roomId;
            document.getElementById('currentRoomName').textContent = roomName;
            
            // Update active room
            document.querySelectorAll('.room-item').forEach(item => {
                item.classList.remove('active');
            });
            event.currentTarget.classList.add('active');
            
            // Subscribe to room messages
            subscription = stompClient.subscribe(`/topic/room/${roomId}`, (message) => {
                const msg = JSON.parse(message.body);
                displayMessage(msg);
            });
            
            // Send join notification
            stompClient.send('/app/chat.join', {}, JSON.stringify({ roomId }));
            
            // Load message history
            await loadMessages(roomId);
            
            // Show input
            document.getElementById('messageInputContainer').style.display = 'flex';
        }

        async function loadMessages(roomId) {
            try {
                const response = await fetch(`${API_URL}/messages/room/${roomId}`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                
                const messages = await response.json();
                const list = document.getElementById('messagesList');
                list.innerHTML = '';
                
                messages.forEach(msg => displayMessage(msg));
            } catch (error) {
                console.error('Failed to load messages:', error);
            }
        }

        function displayMessage(msg) {
            const list = document.getElementById('messagesList');
            const isOwn = msg.senderUsername === currentUser.username;
            const isSystem = msg.type === 'SYSTEM';
            
            const messageEl = document.createElement('div');
            messageEl.className = `message ${isOwn ? 'own' : ''} ${isSystem ? 'system' : ''}`;
            
            const time = msg.sentAt ? new Date(msg.sentAt).toLocaleTimeString() : new Date().toLocaleTimeString();
            
            messageEl.innerHTML = `
                ${!isSystem && !isOwn ? `<div class="message-sender">${msg.senderDisplayName || msg.senderUsername}</div>` : ''}
                <div class="message-content">${msg.content}</div>
                ${!isSystem ? `<div class="message-time">${time}</div>` : ''}
            `;
            
            list.appendChild(messageEl);
            list.scrollTop = list.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            
            if (!content || !currentRoom) return;
            
            stompClient.send('/app/chat.send', {}, JSON.stringify({
                roomId: currentRoom,
                content: content,
                type: 'TEXT'
            }));
            
            input.value = '';
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // Create room modal
        function showCreateRoomModal() {
            document.getElementById('createRoomModal').classList.add('show');
        }

        function hideCreateRoomModal() {
            document.getElementById('createRoomModal').classList.remove('show');
            document.getElementById('newRoomName').value = '';
            document.getElementById('newRoomDesc').value = '';
        }

        async function createRoom() {
            const name = document.getElementById('newRoomName').value.trim();
            const description = document.getElementById('newRoomDesc').value.trim();
            
            if (!name) return;
            
            try {
                const response = await fetch(`${API_URL}/rooms`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({ name, description, type: 'PUBLIC' })
                });
                
                if (!response.ok) throw new Error('Failed to create room');
                
                hideCreateRoomModal();
                loadRooms();
            } catch (error) {
                alert('Failed to create room. Name might be taken.');
            }
        }

        // Online count
        async function loadOnlineCount() {
            try {
                const response = await fetch(`${API_URL}/presence/online`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                
                const data = await response.json();
                document.getElementById('onlineCount').textContent = `${data.count} online`;
            } catch (error) {
                console.error('Failed to load online count:', error);
            }
            
            // Refresh every 10 seconds
            setTimeout(loadOnlineCount, 10000);
        }
    </script>
</body>
</html>
